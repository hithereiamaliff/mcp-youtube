# Smithery.ai configuration for @sfiorini/youtube-mcp
runtime: "typescript"
startCommand:
  type: stdio
  command: "node"
  args: ["dist/index.js"]
config:
  properties:
    youtubeApiKey:
      type: string
      description: "Your YouTube Data API v3 key. Required for YouTube Data API operations."
      secret: true
      x-from: "header"
      x-header-name: "x-youtube-api-key"
    youtubeTranscriptLang:
      type: string
      description: "Default language for YouTube transcripts (e.g., 'en', 'es', 'fr', 'de'). Leave blank to auto-detect from the video."
  required: []
