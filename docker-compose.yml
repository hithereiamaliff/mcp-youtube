services:
  youtube-mcp:
    build: .
    container_name: youtube-mcp
    restart: unless-stopped
    ports:
      - "8086:8080"
    environment:
      - NODE_ENV=production
      - YOUTUBE_TRANSCRIPT_LANG=${YOUTUBE_TRANSCRIPT_LANG:-}
      - KEY_SERVICE_URL=${KEY_SERVICE_URL:-}
      - KEY_SERVICE_TOKEN=${KEY_SERVICE_TOKEN:-}
