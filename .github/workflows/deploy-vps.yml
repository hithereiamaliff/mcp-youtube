name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-vps-youtube
  cancel-in-progress: true

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e

            DEPLOY_DIR="/opt/mcp-servers/youtube"
            REPO_URL="https://github.com/hithereiamaliff/mcp-youtube.git"

            if [ ! -d "$DEPLOY_DIR/.git" ]; then
              mkdir -p "$DEPLOY_DIR"
              git clone "$REPO_URL" "$DEPLOY_DIR"
            fi

            cd "$DEPLOY_DIR"
            git fetch origin main
            git checkout main
            git pull --ff-only origin main

            if [ ! -f .env ]; then
              echo "ERROR: .env file not found at $DEPLOY_DIR/.env"
              echo "Create it manually first with KEY_SERVICE_URL and KEY_SERVICE_TOKEN."
              exit 1
            fi

            docker compose down --remove-orphans 2>/dev/null || true
            docker compose up -d --build

            echo "Waiting for health check..."
            healthy=0
            for i in $(seq 1 15); do
              if curl -sf http://127.0.0.1:8095/health > /dev/null 2>&1; then
                echo "Health check passed."
                healthy=1
                break
              fi
              sleep 2
            done

            if [ "$healthy" -ne 1 ]; then
              echo "Health check failed after 30 seconds."
              docker compose logs --tail=50 youtube-mcp
              exit 1
            fi

            docker compose ps
